<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OnboardX - Status</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117; --surface: #161b22; --surface2: #1c2230; --border: #30363d;
      --text: #e6edf3; --muted: #7d8590; --green: #3fb950; --yellow: #d29922; --red: #f85149; --blue: #58a6ff; --r: 10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    nav { position: sticky; top: 0; z-index: 100; background: rgba(13,17,23,.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); height: 56px; display: flex; align-items: center; padding: 0 24px; gap: 24px; }
    .nav-brand { font-weight:700; font-size:16px; color:var(--text); text-decoration:none; display:flex; align-items:center; gap:8px; }
    .nav-logo { width:26px; height:26px; border-radius:6px; background:linear-gradient(135deg,#5865f2,#3b82f6); display:grid; place-items:center; font-size:11px; font-weight:800; color:#fff; }
    .nav-links { display:flex; gap:2px; list-style:none; }
    .nav-links a { padding:5px 10px; border-radius:6px; font-size:14px; color:var(--muted); text-decoration:none; transition:color .15s,background .15s; }
    .nav-links a:hover { color:var(--text); background:rgba(255,255,255,.05); }
    .nav-links a.active { color:var(--text); }
    .nav-sp { flex:1; }
    #countdown { font-size:12px; color:var(--muted); font-family:'IBM Plex Mono',monospace; }
    .page { max-width: 1060px; margin: 0 auto; padding: 40px 24px 80px; }
    h1 { font-size:24px; font-weight:700; margin-bottom:4px; }
    .subtitle { color:var(--muted); font-size:14px; margin-bottom:24px; }
    .alert { padding:12px 16px; border-radius:var(--r); font-size:14px; margin-bottom:12px; }
    .alert-error { background:rgba(248,81,73,.08); border:1px solid rgba(248,81,73,.3); color:var(--red); }
    .alert-info { background:rgba(88,166,255,.08); border:1px solid rgba(88,166,255,.3); color:var(--blue); }
    .status-banner { display:flex; align-items:center; gap:12px; padding:14px 20px; border-radius:var(--r); border:1px solid; margin-bottom:24px; font-weight:600; font-size:15px; }
    .sb-green { background:rgba(63,185,80,.07); border-color:rgba(63,185,80,.3); color:var(--green); }
    .sb-yellow { background:rgba(210,153,34,.07); border-color:rgba(210,153,34,.3); color:var(--yellow); }
    .sb-red { background:rgba(248,81,73,.07); border-color:rgba(248,81,73,.3); color:var(--red); }
    .sb-right { margin-left:auto; font-size:12px; font-weight:400; opacity:.75; }
    .dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; display:inline-block; }
    .dot-green { background:var(--green); box-shadow:0 0 0 3px rgba(63,185,80,.2); }
    .dot-yellow { background:var(--yellow); box-shadow:0 0 0 3px rgba(210,153,34,.2); }
    .dot-red { background:var(--red); box-shadow:0 0 0 3px rgba(248,81,73,.2); }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.6)} }
    .dot.live { animation:pulse 2.4s ease-in-out infinite; }
    .sec-head { font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); margin:28px 0 12px; display:flex; align-items:center; gap:12px; }
    .sec-head::after { content:''; flex:1; height:1px; background:var(--border); }
    .stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:10px; }
    .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:16px; }
    .stat-label { font-size:11px; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); margin-bottom:7px; }
    .stat-value { font-family:'IBM Plex Mono',monospace; font-size:20px; font-weight:600; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:12px; margin-top:14px; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:16px; }
    .card h3 { font-size:15px; margin-bottom:10px; }
    .meta { color:var(--muted); font-size:12px; line-height:1.6; }
    .list { display:grid; gap:10px; }
    .item { background:var(--surface2); border:1px solid rgba(255,255,255,.05); border-radius:10px; padding:12px; }
    .item-head { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:8px; }
    .badge { display:inline-flex; align-items:center; gap:5px; padding:3px 9px; border-radius:999px; font-size:11px; font-weight:600; }
    .badge-green { background:rgba(63,185,80,.12); color:var(--green); }
    .badge-yellow { background:rgba(210,153,34,.12); color:var(--yellow); }
    .badge-red { background:rgba(248,81,73,.12); color:var(--red); }
    .mono { font-family:'IBM Plex Mono',monospace; font-size:12px; }
    @media(max-width:600px) { .nav-links{display:none} }
  </style>
</head>
<body>
<nav>
  <a class="nav-brand" href="home.html"><div class="nav-logo">OX</div>OnboardX</a>
  <ul class="nav-links">
    <li><a href="home.html">Home</a></li>
    <li><a href="status.html" class="active">Status</a></li>
    <li><a href="mm.html">Maintenance</a></li>
  </ul>
  <div class="nav-sp"></div>
  <span id="countdown">Updates in 15s</span>
</nav>

<main class="page">
  <h1>Status</h1>
  <p class="subtitle">Live cluster and shard health via your hosted API for the MongoDB backend.</p>

  <div id="alertError" class="alert alert-error" hidden></div>
  <div id="alertMaint" class="alert alert-info" hidden></div>

  <div class="status-banner sb-red" id="statusBanner">
    <span class="dot dot-red live" id="bannerDot"></span>
    <span id="bannerLabel">Connecting...</span>
    <span class="sb-right" id="bannerHost"></span>
  </div>

  <div class="sec-head">Host Stats</div>
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-label">Clusters</div><div class="stat-value" id="s-clusters">-</div></div>
    <div class="stat-card"><div class="stat-label">Guilds</div><div class="stat-value" id="s-guilds">-</div></div>
    <div class="stat-card"><div class="stat-label">Users</div><div class="stat-value" id="s-users">-</div></div>
    <div class="stat-card"><div class="stat-label">Avg Ping</div><div class="stat-value" id="s-ping">-</div></div>
    <div class="stat-card"><div class="stat-label">Memory</div><div class="stat-value" id="s-mem">-</div></div>
    <div class="stat-card"><div class="stat-label">Uptime</div><div class="stat-value" id="s-uptime">-</div></div>
  </div>

  <div class="grid">
    <div class="card">
      <h3>Clusters</h3>
      <div id="clusters" class="list"><div class="meta">Loading...</div></div>
    </div>
    <div class="card">
      <h3>Shards</h3>
      <div id="shards" class="list"><div class="meta">Loading...</div></div>
    </div>
  </div>

  <div class="card" style="margin-top:12px">
    <div class="meta" id="metaRow">Connecting to API...</div>
  </div>
</main>

<script type="module">
  import { dashboardConfig, buildApiUrl, createHeaders } from "./config.js";

  let tick = Math.max(1, Math.floor(dashboardConfig.refreshMs / 1000));
  const countdownEl = document.getElementById('countdown');
  setInterval(() => {
    tick = tick <= 1 ? Math.max(1, Math.floor(dashboardConfig.refreshMs / 1000)) : tick - 1;
    countdownEl.textContent = `Updates in ${tick}s`;
  }, 1000);

  async function apiGet(path) {
    const res = await fetch(buildApiUrl(path), {
      headers: createHeaders({ Accept: "application/json" }),
      cache: "no-store",
    });
    const text = await res.text();
    const data = text ? JSON.parse(text) : null;
    if (!res.ok) throw new Error(data?.error || data?.message || `HTTP ${res.status}`);
    return data;
  }

  async function loadAll() {
    tick = Math.max(1, Math.floor(dashboardConfig.refreshMs / 1000));
    try {
      const [system, clusters, shards] = await Promise.all([
        apiGet(dashboardConfig.endpoints.systemStatus),
        apiGet(dashboardConfig.endpoints.clusters),
        apiGet(dashboardConfig.endpoints.shards),
      ]);

      hideAlert('alertError');
      renderSystem(system);
      renderClusters(Array.isArray(clusters) ? clusters : (clusters?.items ?? []));
      renderShards(Array.isArray(shards) ? shards : (shards?.items ?? []));
    } catch (err) {
      showAlert('alertError', `API: ${err.message}`);
    }
  }

  function renderSystem(d) {
    if (d?.maintenance?.enabled) showAlert('alertMaint', `Maintenance: ${d.maintenance.message ?? ''}`);
    else hideAlert('alertMaint');

    setOverallStatus(isStale(d?.expiresAt) ? 'offline' : d?.state);
    document.getElementById('bannerHost').textContent = d?.host ? `${d.host} · PID ${d.managerPid ?? '-'}` : '';
    document.getElementById('s-clusters').textContent = fmt(d?.clusterCount);
    document.getElementById('s-guilds').textContent = fmt(d?.totalGuilds);
    document.getElementById('s-users').textContent = fmt(d?.totalUsers);
    document.getElementById('s-ping').textContent = d?.avgPingMs != null ? `${d.avgPingMs} ms` : '-';
    document.getElementById('s-mem').textContent = fmtMem(d?.memoryMB);
    document.getElementById('s-uptime').textContent = d?.bootedAt ? fmtUptime(null, d.bootedAt) : '-';
    document.getElementById('metaRow').innerHTML =
      `Node <strong>${esc(d?.node ?? '-')}</strong> · Platform <strong>${esc(d?.platform ?? '-')}</strong> · ` +
      `Host <strong>${esc(d?.host ?? '-')}</strong> · Snapshot <strong>${esc(formatDate(d?.lastSnapshotAt))}</strong>`;
  }

  function renderClusters(items) {
    const root = document.getElementById('clusters');
    if (!items.length) {
      root.innerHTML = `<div class="meta">No clusters returned.</div>`;
      return;
    }

    root.innerHTML = items.map(c => {
      const status = clusterHealthStatus(c);
      return `
        <div class="item">
          <div class="item-head">
            <strong>Cluster #${esc(c.clusterId)}</strong>
            <span class="badge ${status.badge}">${status.label}</span>
          </div>
          <div class="meta">
            Ping <span class="mono">${esc(c.ping ?? '-')} ms</span> · Users <span class="mono">${fmt(c.users)}</span><br>
            Shards <span class="mono">${esc((c.shards ?? []).join(', ') || '-')}</span><br>
            Process <span class="mono">${esc(c.processState ?? c.state ?? '-')}</span>
          </div>
        </div>
      `;
    }).join('');
  }

  function renderShards(items) {
    const root = document.getElementById('shards');
    if (!items.length) {
      root.innerHTML = `<div class="meta">No shards returned.</div>`;
      return;
    }

    root.innerHTML = items.slice(0, 80).map(s => {
      const status = shardStatus(s);
      return `
        <div class="item">
          <div class="item-head">
            <strong>Shard #${esc(s.shardId)} (Cluster #${esc(s.clusterId)})</strong>
            <span class="badge ${status.badge}">${status.label}</span>
          </div>
          <div class="meta">
            Ping <span class="mono">${esc(s.ping ?? '-')} ms</span> · Ready <span class="mono">${s.ready ? 'yes' : 'no'}</span><br>
            State <span class="mono">${esc(s.state ?? '-')}</span> · Code <span class="mono">${esc(s.statusCode ?? '-')}</span>
          </div>
        </div>
      `;
    }).join('') + (items.length > 80 ? `<div class="meta">Showing first 80 shards...</div>` : '');
  }

  function clusterHealthStatus(c) {
    if (isStale(c?.expiresAt) || c?.state === 'stopped' || c?.state === 'dead') return { badge: 'badge-red', label: 'Offline' };
    if (c?.ready && Number(c?.ping) >= 0) return { badge: 'badge-green', label: 'Ready' };
    return { badge: 'badge-yellow', label: c?.state === 'maintenance' ? 'Maintenance' : 'Degraded' };
  }

  function shardStatus(s) {
    if (isStale(s?.expiresAt) || s?.state === 'stopped' || s?.state === 'dead') return { badge: 'badge-red', label: 'Offline' };
    if (s?.ready === true || s?.state === 'ready' || s?.statusCode === 0) return { badge: 'badge-green', label: 'Ready' };
    return { badge: 'badge-yellow', label: s?.state || 'Degraded' };
  }

  function setOverallStatus(state) {
    const map = {
      running: { cls:'sb-green', dot:'dot-green', label:'All Systems Operational' },
      maintenance: { cls:'sb-yellow', dot:'dot-yellow', label:'Maintenance Active' },
      degraded: { cls:'sb-yellow', dot:'dot-yellow', label:'Partial Outage' },
    };
    const s = map[state] ?? { cls:'sb-red', dot:'dot-red', label:'Offline or Unreachable' };
    document.getElementById('statusBanner').className = `status-banner ${s.cls}`;
    document.getElementById('bannerDot').className = `dot ${s.dot} live`;
    document.getElementById('bannerLabel').textContent = s.label;
  }

  function isStale(expiresAt) {
    if (!expiresAt) return false;
    const d = new Date(expiresAt);
    return !Number.isNaN(d.getTime()) && Date.now() > d.getTime();
  }

  function formatDate(value) {
    if (!value) return '-';
    const d = new Date(value);
    return Number.isNaN(d.getTime()) ? '-' : d.toLocaleString();
  }

  function fmt(v) {
    const n = Number(v);
    return (v == null || Number.isNaN(n)) ? '-' : n.toLocaleString();
  }

  function fmtMem(mb) {
    const n = Number(mb);
    if (mb == null || Number.isNaN(n)) return '-';
    return n >= 1024 ? `${(n / 1024).toFixed(2)} GB` : `${n} MB`;
  }

  function fmtUptime(_, bootedAt) {
    const start = new Date(bootedAt);
    if (Number.isNaN(start.getTime())) return '-';
    const s = Math.max(0, Math.floor((Date.now() - start.getTime()) / 1000));
    const d = Math.floor(s / 86400), h = Math.floor((s % 86400) / 3600), m = Math.floor((s % 3600) / 60);
    if (d > 0) return `${d}d ${h}h`;
    if (h > 0) return `${h}h ${m}m`;
    return `${m}m`;
  }

  function showAlert(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.hidden = false;
  }

  function hideAlert(id) {
    document.getElementById(id).hidden = true;
  }

  function esc(value) {
    return String(value ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  loadAll();
  setInterval(loadAll, dashboardConfig.refreshMs);
</script>
</body>
</html>
