<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OnboardX System Dashboard</title>
  <style>
    :root {
      --bg: #070b16;
      --panel: rgba(15, 26, 48, 0.82);
      --border: rgba(160, 200, 255, 0.14);
      --text: #eef6ff;
      --muted: #9bb0c8;
      --ok: #33d17a;
      --warn: #ffbd59;
      --bad: #ff6f6f;
      --accent: #74c5ff;
      --accent2: #8f82ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(116, 197, 255, 0.18), transparent 32%),
        radial-gradient(circle at top right, rgba(143, 130, 255, 0.16), transparent 30%),
        linear-gradient(165deg, #050814 0%, #070b16 55%, #050814 100%);
      color: var(--text);
    }
    .wrap { width: min(1200px, calc(100% - 28px)); margin: 0 auto; padding: 26px 0 54px; }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 16px 44px rgba(0,0,0,.28);
    }
    header { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; flex-wrap: wrap; margin-bottom: 14px; }
    h1 { margin: 0; font-size: 26px; letter-spacing: -0.02em; }
    .sub { margin: 6px 0 0; color: var(--muted); line-height: 1.55; max-width: 780px; }
    .toolbar, .toolbar2 { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .toolbar2 { margin-top: 12px; }
    button {
      border: 0;
      border-radius: 14px;
      padding: 10px 14px;
      font-weight: 800;
      cursor: pointer;
      color: #07111b;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
    }
    button.secondary {
      background: rgba(255,255,255,.06);
      color: var(--text);
      border: 1px solid rgba(255,255,255,.10);
    }
    input, textarea {
      width: 100%;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.18);
      color: var(--text);
      padding: 10px 12px;
      font-size: 14px;
    }
    .row { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 12px; }
    .stat { padding: 14px; border-radius: 16px; background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.06); }
    .label { color: var(--muted); text-transform: uppercase; letter-spacing: .08em; font-size: 12px; }
    .value { margin-top: 8px; font-size: 22px; font-weight: 800; }
    .pill { display: inline-flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 999px; font-weight: 900; text-transform: uppercase; letter-spacing: .08em; font-size: 12px; }
    .pill.ok { background: rgba(51, 209, 122, .14); color: var(--ok); }
    .pill.warn { background: rgba(255, 189, 89, .14); color: var(--warn); }
    .pill.bad { background: rgba(255, 111, 111, .14); color: var(--bad); }
    .grid2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 12px; margin-top: 12px; }
    .list { display: grid; gap: 10px; margin-top: 12px; }
    .item { padding: 12px; border-radius: 16px; background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.06); }
    .item-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
    .item-title { font-weight: 900; }
    .meta { color: var(--muted); font-size: 13px; line-height: 1.6; margin-top: 8px; }
    .hint { color: var(--muted); font-size: 13px; line-height: 1.55; }
    .error { color: var(--bad); font-weight: 800; }
    textarea {
      min-height: 180px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
      line-height: 1.55;
      resize: vertical;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>System Dashboard</h1>
        <p class="sub">API-based dashboard for the MongoDB-backed bot. Point <code>monitoring/config.js</code> at your hosted backend and optionally store an auth token for protected routes.</p>
      </div>
      <div class="toolbar">
        <button class="secondary" id="reload">Reload</button>
      </div>
    </header>

    <div class="card" style="margin-bottom: 12px;">
      <div class="label">Access Token</div>
      <input id="token" placeholder="Paste dashboard token if your API is protected" />
      <div class="toolbar2">
        <button id="saveToken">Save token</button>
        <button class="secondary" id="clearToken">Clear token</button>
        <span class="hint">Stored only in this browser via localStorage.</span>
      </div>
      <div id="error" class="error" style="margin-top: 10px;"></div>
    </div>

    <div class="card" style="margin-bottom: 12px;">
      Status: <span id="status"><span class="pill warn">loading</span></span>
      <div class="hint" id="lastUpdated" style="margin-top: 10px;">Waiting for API…</div>
    </div>

    <div class="card">
      <div class="row" id="summary"></div>
    </div>

    <div class="grid2">
      <div class="card">
        <div class="label">Clusters</div>
        <div class="list" id="clusters"></div>
      </div>
      <div class="card">
        <div class="label">Shards (preview)</div>
        <div class="list" id="shards"></div>
      </div>
    </div>

    <div class="card" style="margin-top: 12px;">
      <div class="label">Raw</div>
      <textarea id="raw" spellcheck="false" readonly></textarea>
    </div>
  </div>

  <script type="module">
    import { dashboardConfig, buildApiUrl, createHeaders, getStoredToken, setStoredToken } from "./config.js";

    const tokenEl = document.getElementById("token");
    const errorEl = document.getElementById("error");
    const statusEl = document.getElementById("status");
    const summaryEl = document.getElementById("summary");
    const clustersEl = document.getElementById("clusters");
    const shardsEl = document.getElementById("shards");
    const rawEl = document.getElementById("raw");
    const lastUpdatedEl = document.getElementById("lastUpdated");

    document.getElementById("reload").addEventListener("click", loadAll);
    document.getElementById("saveToken").addEventListener("click", () => {
      setStoredToken(tokenEl.value.trim());
      loadAll();
    });
    document.getElementById("clearToken").addEventListener("click", () => {
      tokenEl.value = "";
      setStoredToken("");
      loadAll();
    });

    tokenEl.value = getStoredToken();

    async function apiGet(path) {
      const res = await fetch(buildApiUrl(path), {
        headers: createHeaders({ Accept: "application/json" }),
        cache: "no-store",
      });
      const text = await res.text();
      let data = null;
      try { data = text ? JSON.parse(text) : null; } catch { data = { raw: text }; }
      if (!res.ok) throw new Error(data?.error || data?.message || `HTTP ${res.status}`);
      return data;
    }

    async function loadAll() {
      errorEl.textContent = "";
      try {
        const [system, clusters, shards] = await Promise.all([
          apiGet(dashboardConfig.endpoints.systemStatus),
          apiGet(dashboardConfig.endpoints.clusters),
          apiGet(dashboardConfig.endpoints.shards),
        ]);

        renderSystem(system);
        renderClusters(Array.isArray(clusters) ? clusters : (clusters?.items ?? []));
        renderShards(Array.isArray(shards) ? shards : (shards?.items ?? []));
        rawEl.value = JSON.stringify({ system, clusters, shards }, null, 2);
        lastUpdatedEl.textContent = `Last reload: ${new Date().toLocaleString()}`;
      } catch (err) {
        errorEl.textContent = err.message;
      }
    }

    function renderSystem(d) {
      const stale = isStale(d?.expiresAt);
      const state = stale ? "offline" : (d?.state || "unknown");
      const pillClass = (state === "running" || state === "maintenance") && !stale ? "ok" : stale ? "bad" : "warn";
      statusEl.innerHTML = `<span class="pill ${pillClass}">${escapeHtml(stale ? "offline (stale)" : state)}</span>`;

      const cards = [
        { label: "Clusters", value: fmt(d?.clusterCount) },
        { label: "Ready Clusters", value: `${fmt(d?.readyClusters)}/${fmt(d?.clusterCount)}` },
        { label: "Shards", value: fmt(d?.totalShards) },
        { label: "Ready Shards", value: `${fmt(d?.readyShards)}/${fmt(d?.totalShards)}` },
        { label: "Guilds", value: fmt(d?.totalGuilds) },
        { label: "Users", value: fmt(d?.totalUsers) },
        { label: "Avg Ping", value: d?.avgPingMs != null ? `${d.avgPingMs} ms` : "-" },
        { label: "Host", value: d?.host || "-" },
      ];
      summaryEl.innerHTML = cards.map(c => `<div class="stat"><div class="label">${escapeHtml(c.label)}</div><div class="value">${escapeHtml(String(c.value))}</div></div>`).join("");
    }

    function renderClusters(items) {
      clustersEl.innerHTML = items.length ? items.map(c => {
        const stale = isStale(c.expiresAt);
        const label = stale ? "offline (stale)" : (c.state || "unknown");
        const cls = label.startsWith("ready") && !stale ? "ok" : stale ? "bad" : "warn";
        return `
          <div class="item">
            <div class="item-head">
              <div class="item-title">Cluster #${escapeHtml(String(c.clusterId))}</div>
              <span class="pill ${cls}">${escapeHtml(label)}</span>
            </div>
            <div class="meta">
              Guilds: <code>${escapeHtml(String(c.guilds ?? 0))}</code> · Users: <code>${escapeHtml(String(c.users ?? 0))}</code> · Ping: <code>${escapeHtml(String(c.ping ?? "-"))}ms</code><br>
              Shards: <code>${escapeHtml((c.shards ?? []).join(", ") || "-")}</code><br>
              Heartbeat: <code>${escapeHtml(String(c.lastHeartbeatAt ?? "-"))}</code> · Expires: <code>${escapeHtml(String(c.expiresAt ?? "-"))}</code>
            </div>
          </div>
        `;
      }).join("") : `<div class="hint">No clusters returned.</div>`;
    }

    function renderShards(items) {
      const preview = items.slice(0, 60);
      shardsEl.innerHTML = preview.length ? preview.map(s => {
        const stale = isStale(s.expiresAt);
        const ready = s.ready === true || s.state === "ready" || s.statusCode === 0;
        const label = stale ? "offline" : (ready ? "ready" : (s.state || "unknown"));
        const cls = ready && !stale ? "ok" : stale ? "bad" : "warn";
        return `
          <div class="item">
            <div class="item-head">
              <div class="item-title">Shard #${escapeHtml(String(s.shardId))} (Cluster #${escapeHtml(String(s.clusterId))})</div>
              <span class="pill ${cls}">${escapeHtml(label)}</span>
            </div>
            <div class="meta">
              Ping: <code>${escapeHtml(String(s.ping ?? "-"))}ms</code> · Ready: <code>${s.ready ? "yes" : "no"}</code> · Seq: <code>${escapeHtml(String(s.sequence ?? "-"))}</code><br>
              Heartbeat: <code>${escapeHtml(String(s.lastHeartbeatAt ?? "-"))}</code> · Expires: <code>${escapeHtml(String(s.expiresAt ?? "-"))}</code>
            </div>
          </div>
        `;
      }).join("") + (items.length > 60 ? `<div class="hint">Showing first 60 shards...</div>` : "") : `<div class="hint">No shards returned.</div>`;
    }

    function isStale(expiresAt) {
      if (!expiresAt) return false;
      const d = new Date(expiresAt);
      return !Number.isNaN(d.getTime()) && Date.now() > d.getTime();
    }

    function fmt(v) {
      const n = Number(v);
      return (v == null || Number.isNaN(n)) ? "-" : n.toLocaleString();
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    loadAll();
    setInterval(loadAll, dashboardConfig.refreshMs);
  </script>
</body>
</html>
