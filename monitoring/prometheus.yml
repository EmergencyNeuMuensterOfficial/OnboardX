# monitoring/prometheus.yml
# Prometheus configuration for scraping OnboardX V2 /metrics endpoint.
#
# Usage (with docker-compose):
#   Uncomment the prometheus service in docker-compose.yml, then:
#   docker compose up -d prometheus

global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: 'onboardx-bot'
    static_configs:
      - targets:
          - 'bot:9090'   # Single shard/cluster manager
          # Add more if running CLUSTER_COUNT > 1 (each worker gets its own port)
          # - 'bot:9091'
          # - 'bot:9092'
    metrics_path: '/metrics'
    scrape_timeout: 10s

  # Self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
