<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OnboardX – Maintenance & Incidents</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --surface2:#1c2230;
      --border:  #30363d;
      --text:    #e6edf3;
      --muted:   #7d8590;
      --green:   #3fb950;
      --yellow:  #d29922;
      --red:     #f85149;
      --blue:    #58a6ff;
      --purple:  #a371f7;
      --r:       10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(13,17,23,.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      height: 56px; display: flex; align-items: center;
      padding: 0 24px; gap: 24px;
    }
    .nav-brand { font-weight:700; font-size:16px; color:var(--text); text-decoration:none; display:flex; align-items:center; gap:8px; }
    .nav-logo  { width:26px; height:26px; border-radius:6px; background:linear-gradient(135deg,#5865f2,#3b82f6); display:grid; place-items:center; font-size:11px; font-weight:800; color:#fff; }
    .nav-links { display:flex; gap:2px; list-style:none; }
    .nav-links a { padding:5px 10px; border-radius:6px; font-size:14px; color:var(--muted); text-decoration:none; transition:color .15s,background .15s; }
    .nav-links a:hover { color:var(--text); background:rgba(255,255,255,.05); }
    .nav-links a.active { color:var(--text); }
    .nav-sp { flex:1; }

    .page { max-width: 860px; margin: 0 auto; padding: 40px 24px 80px; }
    h1 { font-size:24px; font-weight:700; margin-bottom:4px; }
    .subtitle { color:var(--muted); font-size:14px; margin-bottom:32px; }
    .sec-head { font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); margin:32px 0 14px; display:flex; align-items:center; gap:10px; }
    .sec-head::after { content:''; flex:1; height:1px; background:var(--border); }

    /* MAINTENANCE CARD */
    .maint-card {
      border-radius: var(--r); border: 1px solid; padding: 20px;
      margin-bottom: 14px;
    }
    .maint-card.active   { background:rgba(248,81,73,.06);  border-color:rgba(248,81,73,.3); }
    .maint-card.scheduled{ background:rgba(210,153,34,.06); border-color:rgba(210,153,34,.3);}
    .maint-card.resolved { background:rgba(63,185,80,.05);  border-color:rgba(63,185,80,.2); }
    .maint-card.idle     { background:var(--surface);       border-color:var(--border); }
    .maint-head { display:flex; align-items:center; gap:10px; margin-bottom:10px; flex-wrap:wrap; }
    .maint-title { font-size:15px; font-weight:600; }
    .badge {
      display:inline-flex; align-items:center; gap:4px;
      padding:3px 9px; border-radius:999px;
      font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.04em;
    }
    .badge-red    { background:rgba(248,81,73,.12);  color:var(--red);    }
    .badge-yellow { background:rgba(210,153,34,.12); color:var(--yellow); }
    .badge-green  { background:rgba(63,185,80,.12);  color:var(--green);  }
    .badge-purple { background:rgba(163,113,247,.12);color:var(--purple); }
    .badge-grey   { background:rgba(125,133,144,.12);color:var(--muted);  }
    .badge-blue   { background:rgba(88,166,255,.12); color:var(--blue);   }
    .maint-msg { font-size:14px; color:var(--muted); line-height:1.6; }
    .maint-times { display:flex; flex-wrap:wrap; gap:6px 20px; margin-top:12px; font-size:12px; color:var(--muted); }
    .maint-times span strong { color:var(--text); font-weight:500; }

    /* INCIDENT FEED */
    .incident-feed { display:flex; flex-direction:column; gap:14px; }

    .incident-card {
      background: var(--surface); border:1px solid var(--border);
      border-radius: var(--r); overflow: hidden;
    }
    .incident-card-head {
      display:flex; align-items:center; gap:10px;
      padding:14px 18px; cursor:pointer;
      transition:background .12s;
    }
    .incident-card-head:hover { background: rgba(255,255,255,.025); }
    .incident-card-title { font-size:14px; font-weight:600; flex:1; }
    .incident-card-time  { font-size:12px; color:var(--muted); margin-left:auto; }
    .incident-card-body  { padding:0 18px 14px; display:none; }
    .incident-card-body.open { display:block; }
    .incident-card-body p { font-size:13px; color:var(--muted); line-height:1.65; }
    .incident-updates { margin-top:12px; display:flex; flex-direction:column; gap:10px; }
    .upd-row { display:flex; gap:12px; }
    .upd-line { display:flex; flex-direction:column; align-items:center; gap:0; }
    .upd-dot  { width:8px; height:8px; border-radius:50%; background:var(--blue); margin-top:3px; flex-shrink:0; }
    .upd-bar  { width:1px; flex:1; background:var(--border); margin-top:4px; }
    .upd-content { flex:1; padding-bottom:2px; }
    .upd-status { font-size:12px; font-weight:600; color:var(--text); margin-bottom:2px; }
    .upd-msg    { font-size:13px; color:var(--muted); line-height:1.5; }
    .upd-time   { font-size:11px; color:var(--muted); margin-top:3px; }

    /* EMPTY STATES */
    .empty {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--r); padding:40px;
      text-align:center; color:var(--muted);
    }
    .empty-icon { font-size:32px; margin-bottom:12px; }
    .empty-title { font-size:15px; font-weight:600; color:var(--text); margin-bottom:6px; }
    .empty-sub   { font-size:13px; line-height:1.6; }

    /* SKELETON */
    .skel { background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.04) 75%); background-size:200% 100%; animation:sh 1.5s infinite; border-radius:4px; display:inline-block; }
    @keyframes sh { 0%{background-position:200% 0}100%{background-position:-200% 0} }

    @media(max-width:600px) { .nav-links{display:none} }
  </style>
</head>
<body>

<nav>
  <a class="nav-brand" href="home.html"><div class="nav-logo">OX</div>OnboardX</a>
  <ul class="nav-links">
    <li><a href="home.html">Home</a></li>
    <li><a href="status.html">Status</a></li>
    <li><a href="mm.html" class="active">Maintenance</a></li>
  </ul>
  <div class="nav-sp"></div>
</nav>

<main class="page">
  <h1>Maintenance &amp; Incidents</h1>
  <p class="subtitle">Scheduled windows, active maintenance, and past incident history.</p>

  <!-- Active / Scheduled Maintenance -->
  <div class="sec-head">Current Maintenance</div>
  <div id="maintSection">
    <div class="maint-card idle">
      <div class="maint-head">
        <span class="maint-title">Checking maintenance status…</span>
        <span class="badge badge-grey skel" style="width:80px;height:20px"></span>
      </div>
    </div>
  </div>

  <!-- Incident History -->
  <div class="sec-head">Incident History</div>
  <div id="incidentFeed" class="incident-feed">
    <div class="empty">
      <div class="empty-icon">📋</div>
      <div class="empty-title">Loading incidents…</div>
    </div>
  </div>
</main>

<script type="module">
  import { initializeApp }                               from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
  import { getFirestore, doc, collection,
           onSnapshot, query, orderBy, limit }           from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
  import { firebaseConfig }                              from "./config.js";

  const db = getFirestore(initializeApp(firebaseConfig));

  // ── Maintenance from clusterStatus doc ────────────────────────────────────
  onSnapshot(doc(db, 'system', 'clusterStatus'), snap => {
    if (!snap.exists()) return;
    const d = snap.data();
    const m = d.maintenance ?? {};
    renderMaintenance(m, d.state);
  });

  function renderMaintenance(m, systemState) {
    const sec = document.getElementById('maintSection');

    // Determine what to show
    const isActive    = m.enabled === true;
    const startedAt   = m.startedAt   ? tsToDate(m.startedAt)   : null;
    const endAt       = m.estimatedEndAt ? tsToDate(m.estimatedEndAt) : null;
    const isScheduled = !isActive && startedAt && startedAt > new Date();

    if (!isActive && !isScheduled) {
      sec.innerHTML = `
        <div class="maint-card idle">
          <div class="maint-head">
            <span class="maint-title">No Maintenance Scheduled</span>
            <span class="badge badge-green">All Clear</span>
          </div>
          <p class="maint-msg">There are no active or upcoming maintenance windows at this time.</p>
        </div>
      `;
      return;
    }

    const cardCls    = isActive ? 'active' : 'scheduled';
    const badgeCls   = isActive ? 'badge-red' : 'badge-yellow';
    const badgeLabel = isActive ? 'Active'    : 'Scheduled';

    sec.innerHTML = `
      <div class="maint-card ${cardCls}">
        <div class="maint-head">
          <span class="maint-title">${esc(m.message ?? 'Maintenance Window')}</span>
          <span class="badge ${badgeCls}">${badgeLabel}</span>
          ${isActive ? `<span class="badge badge-red">⚠ In Progress</span>` : ''}
        </div>
        <p class="maint-msg">${esc(m.message ?? 'Scheduled maintenance is planned.')}</p>
        <div class="maint-times">
          ${startedAt ? `<span>Started <strong>${startedAt.toLocaleString()}</strong></span>` : ''}
          ${endAt     ? `<span>Est. end <strong>${endAt.toLocaleString()}</strong></span>`    : '<span>Est. end <strong>—</strong></span>'}
          ${isScheduled ? `<span>Starts in <strong>${fmtCountdown(startedAt)}</strong></span>` : ''}
        </div>
      </div>
    `;
  }

  // ── Incidents sub-collection ───────────────────────────────────────────────
  // Looks for system/clusterStatus/incidents, ordered by createdAt desc.
  // If that path returns empty, we show a friendly "no incidents" state.
  onSnapshot(
    query(
      collection(db, 'system', 'clusterStatus', 'incidents'),
      orderBy('createdAt', 'desc'),
      limit(30)
    ),
    snap => renderIncidents(snap.docs),
    err => {
      // Collection may not exist yet — show empty state gracefully
      renderIncidents([]);
    }
  );

  function renderIncidents(docs) {
    const feed = document.getElementById('incidentFeed');
    if (!docs.length) {
      feed.innerHTML = `
        <div class="empty">
          <div class="empty-icon">✅</div>
          <div class="empty-title">No Incidents Recorded</div>
          <div class="empty-sub">All systems have been running without incident.<br>Past incidents will appear here when logged.</div>
        </div>
      `;
      return;
    }

    feed.innerHTML = docs.map((d, i) => {
      const inc    = d.data();
      const ts     = tsToDate(inc.createdAt);
      const status = inc.status ?? 'investigating';
      const updates = Array.isArray(inc.updates) ? inc.updates : [];
      const badgeCls = {
        resolved:    'badge-green',
        monitoring:  'badge-blue',
        identified:  'badge-yellow',
        investigating:'badge-red',
      }[status] ?? 'badge-grey';

      return `
        <div class="incident-card">
          <div class="incident-card-head" onclick="toggleCard(this)">
            <span class="badge ${badgeCls}">${esc(status)}</span>
            <span class="incident-card-title">${esc(inc.title ?? 'Incident')}</span>
            <span class="incident-card-time">${ts ? ts.toLocaleDateString() : '—'}</span>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="color:var(--muted);flex-shrink:0;transition:transform .2s" class="chevron">
              <path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="incident-card-body ${i === 0 ? 'open' : ''}">
            ${inc.message ? `<p>${esc(inc.message)}</p>` : ''}
            ${updates.length ? `
              <div class="incident-updates">
                ${updates.map((u, ui) => `
                  <div class="upd-row">
                    <div class="upd-line">
                      <div class="upd-dot"></div>
                      ${ui < updates.length-1 ? '<div class="upd-bar"></div>' : ''}
                    </div>
                    <div class="upd-content">
                      <div class="upd-status">${esc(u.status ?? '')}</div>
                      <div class="upd-msg">${esc(u.message ?? '')}</div>
                      <div class="upd-time">${u.at ? tsToDate(u.at)?.toLocaleString() ?? '' : ''}</div>
                    </div>
                  </div>
                `).join('')}
              </div>
            ` : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  // ── Utils ──────────────────────────────────────────────────────────────────
  window.toggleCard = function(head) {
    const body    = head.nextElementSibling;
    const chevron = head.querySelector('.chevron');
    body.classList.toggle('open');
    if (chevron) chevron.style.transform = body.classList.contains('open') ? 'rotate(180deg)' : '';
  };

  function tsToDate(v) {
    if (!v) return null;
    if (v?.toDate) return v.toDate();
    const d = new Date(v);
    return isNaN(d) ? null : d;
  }

  function fmtCountdown(d) {
    const s = Math.max(0, Math.floor((d - Date.now()) / 1000));
    const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
    if (h > 23) return `${Math.floor(h/24)}d ${h%24}h`;
    if (h > 0)  return `${h}h ${m}m`;
    return `${m}m`;
  }

  function esc(str) {
    return String(str ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
