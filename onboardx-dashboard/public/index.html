<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OnboardX V2 — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080b14;
    --card: #0d1220;
    --border: rgba(255,255,255,0.07);
    --accent: #3b82f6;
    --accent2: #06b6d4;
    --accent3: #8b5cf6;
    --text: #f0f4ff;
    --sub: #8b9ab5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(59,130,246,0.12) 0%, transparent 70%);
    top: -100px; left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 52px 48px;
    width: 440px;
    text-align: center;
    position: relative;
    z-index: 1;
    box-shadow: 0 32px 80px rgba(0,0,0,0.5);
    animation: rise .5s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes rise { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:none} }

  .logo {
    width: 68px; height: 68px;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 20px; font-weight: 700;
    color: white;
    margin: 0 auto 24px;
    box-shadow: 0 0 40px rgba(59,130,246,0.4);
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 28px; font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
  }
  h1 span { color: var(--accent); }

  .version {
    font-family: 'Space Mono', monospace;
    font-size: 11px; color: var(--accent2);
    letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 12px;
  }

  p {
    color: var(--sub);
    font-size: 14px;
    line-height: 1.7;
    margin-bottom: 36px;
  }

  .discord-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: #5865F2;
    color: white;
    border: none;
    border-radius: 12px;
    padding: 16px 28px;
    font-size: 15px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    width: 100%;
    transition: all .2s;
    text-decoration: none;
    box-shadow: 0 4px 20px rgba(88,101,242,0.4);
  }
  .discord-btn:hover {
    background: #4752c4;
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(88,101,242,0.5);
  }
  .discord-btn svg { width: 22px; height: 22px; fill: white; flex-shrink: 0; }

  .features {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; margin-top: 32px;
  }
  .feature {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    font-size: 12px;
    color: var(--sub);
    text-align: left;
    display: flex; align-items: center; gap: 8px;
  }
  .feature-icon { font-size: 16px; flex-shrink: 0; }

  .footer {
    margin-top: 28px;
    font-size: 12px;
    color: var(--sub);
  }
  .footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>

<div class="card">
  <div class="logo">OX</div>
  <div class="version">V2 Dashboard</div>
  <h1>Onboard<span>X</span></h1>
  <p>Verwalte deine Server-Konfiguration direkt im Browser — Moderation, AutoMod, Tickets, Leveling und mehr.</p>

  <a class="discord-btn" href="#" id="loginBtn">
    <svg viewBox="0 0 71 55" xmlns="http://www.w3.org/2000/svg">
      <path d="M60.1 4.9A58.5 58.5 0 0 0 45.6.9a.2.2 0 0 0-.2.1 40.8 40.8 0 0 0-1.8 3.7 54 54 0 0 0-16.2 0A37.7 37.7 0 0 0 25.6 1a.2.2 0 0 0-.2-.1A58.4 58.4 0 0 0 10.9 4.9a.2.2 0 0 0-.1.1C1.6 18.1-.9 30.9.3 43.5a.2.2 0 0 0 .1.2 58.8 58.8 0 0 0 17.7 9 .2.2 0 0 0 .2-.1 42 42 0 0 0 3.6-5.9.2.2 0 0 0-.1-.3 38.7 38.7 0 0 1-5.5-2.6.2.2 0 0 1 0-.4c.4-.3.7-.6 1.1-.9a.2.2 0 0 1 .2 0c11.5 5.3 24 5.3 35.4 0a.2.2 0 0 1 .2 0l1.1.9a.2.2 0 0 1 0 .4 36.1 36.1 0 0 1-5.5 2.6.2.2 0 0 0-.1.3 47 47 0 0 0 3.6 5.9.2.2 0 0 0 .2.1 58.6 58.6 0 0 0 17.8-9 .2.2 0 0 0 .1-.2C72.9 29 70 16.3 60.2 5a.2.2 0 0 0-.1-.1zM23.7 36.1c-3.5 0-6.4-3.2-6.4-7.2s2.8-7.2 6.4-7.2c3.6 0 6.5 3.3 6.4 7.2 0 4-2.8 7.2-6.4 7.2zm23.6 0c-3.5 0-6.4-3.2-6.4-7.2s2.8-7.2 6.4-7.2c3.6 0 6.5 3.3 6.4 7.2 0 4-2.8 7.2-6.4 7.2z"/>
    </svg>
    Mit Discord anmelden
  </a>

  <div class="features">
    <div class="feature"><span class="feature-icon">🔨</span> Moderation</div>
    <div class="feature"><span class="feature-icon">🤖</span> AutoMod</div>
    <div class="feature"><span class="feature-icon">⭐</span> Leveling</div>
    <div class="feature"><span class="feature-icon">🎫</span> Tickets</div>
    <div class="feature"><span class="feature-icon">📅</span> Events</div>
    <div class="feature"><span class="feature-icon">🖥️</span> Cluster Monitor</div>
  </div>

  <div class="footer">
    Durch das Anmelden stimmst du unseren <a href="#">Nutzungsbedingungen</a> zu.
  </div>
</div>

<script>
  // Build Discord OAuth URL
  const CLIENT_ID = '1489947414382116905'; // replaced at runtime via meta or env
  const REDIRECT  = encodeURIComponent(window.location.origin + '/callback');
  const SCOPES    = encodeURIComponent('identify guilds');
  const OAUTH_URL = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${REDIRECT}&response_type=code&scope=${SCOPES}`;

  // If already logged in, redirect straight to dashboard
  if (localStorage.getItem('ox_token')) {
    window.location.href = '/dashboard';
  }

  document.getElementById('loginBtn').href = OAUTH_URL;
</script>
</body>
</html>
