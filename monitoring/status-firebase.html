<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OnboardX status - API</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: rgba(18, 28, 54, 0.78);
      --border: rgba(160, 200, 255, 0.14);
      --text: #eef6ff;
      --muted: #9bb0c8;
      --ok: #33d17a;
      --warn: #ffbd59;
      --bad: #ff6f6f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top left, rgba(90, 150, 255, 0.22), transparent 30%), linear-gradient(170deg, #070b16 0%, #0b1020 55%, #070b16 100%);
      color: var(--text);
    }
    .wrap { width: min(980px, calc(100% - 28px)); margin: 0 auto; padding: 28px 0 50px; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 18px; padding: 18px; box-shadow: 0 16px 40px rgba(0,0,0,.28); }
    h1 { margin: 0 0 8px; font-size: 28px; }
    .sub { color: var(--muted); line-height: 1.6; margin: 0 0 18px; }
    .row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
    .stat { padding: 14px; border-radius: 16px; background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.06); }
    .label { color: var(--muted); text-transform: uppercase; letter-spacing: .08em; font-size: 12px; }
    .value { margin-top: 8px; font-size: 22px; font-weight: 800; }
    .pill { display: inline-flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 999px; font-weight: 800; text-transform: uppercase; letter-spacing: .08em; font-size: 12px; }
    .pill.ok { background: rgba(51, 209, 122, .14); color: var(--ok); }
    .pill.warn { background: rgba(255, 189, 89, .14); color: var(--warn); }
    .pill.bad { background: rgba(255, 111, 111, .14); color: var(--bad); }
    code { color: #cfe3ff; }
    .error { color: var(--bad); font-weight: 700; margin-top: 14px; }
    .meta { color: var(--muted); font-size: 13px; margin-top: 14px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Status (API)</h1>
      <p class="sub">This page now reads your hosted backend API instead of Firebase. If <code>expiresAt</code> is in the past, the system is treated as offline.</p>
      <div id="status"></div>
      <div class="row" id="stats" style="margin-top: 14px;"></div>
      <div class="meta" id="meta"></div>
      <div class="error" id="error"></div>
    </div>
  </div>

  <script type="module">
    import { dashboardConfig, buildApiUrl, createHeaders } from "./config.js";

    const statusEl = document.getElementById('status');
    const statsEl = document.getElementById('stats');
    const errorEl = document.getElementById('error');
    const metaEl = document.getElementById('meta');

    async function loadStatus() {
      errorEl.textContent = "";
      try {
        const res = await fetch(buildApiUrl(dashboardConfig.endpoints.systemStatus), {
          headers: createHeaders({ Accept: "application/json" }),
          cache: "no-store",
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const d = await res.json();
        const stale = isStale(d?.expiresAt);
        const state = stale ? "offline" : (d?.state || "unknown");
        renderStatus(state, stale);
        renderStats(d, stale);
      } catch (err) {
        errorEl.textContent = `API error: ${err.message}`;
        renderUnknown();
      }
    }

    function renderUnknown() {
      statusEl.innerHTML = `<span class="pill bad">unknown</span>`;
      statsEl.innerHTML = "";
      metaEl.innerHTML = "";
    }

    function renderStatus(state, stale) {
      const cls = (state === "running" || state === "maintenance") && !stale ? "ok" : stale ? "bad" : "warn";
      const label = stale ? "offline (stale)" : state;
      statusEl.innerHTML = `<span class="pill ${cls}">${escapeHtml(label)}</span>`;
    }

    function renderStats(d, stale) {
      const last = parseDate(d?.lastSnapshotAt);
      const exp = parseDate(d?.expiresAt);
      statsEl.innerHTML = [
        card("Clusters", fmt(d?.clusterCount)),
        card("Ready Clusters", `${fmt(d?.readyClusters)}/${fmt(d?.clusterCount)}`),
        card("Shards", fmt(d?.totalShards)),
        card("Ready Shards", `${fmt(d?.readyShards)}/${fmt(d?.totalShards)}`),
        card("Guilds", fmt(d?.totalGuilds)),
        card("Users", fmt(d?.totalUsers)),
      ].join("");

      metaEl.innerHTML =
        `<div>Host: <code>${escapeHtml(d?.host || "-")}</code></div>` +
        `<div>Manager PID: <code>${escapeHtml(String(d?.managerPid || "-"))}</code></div>` +
        `<div>Last snapshot: <code>${escapeHtml(last ? last.toLocaleString() : "-")}</code></div>` +
        `<div>Expires at: <code>${escapeHtml(exp ? exp.toLocaleString() : "-")}</code> ${stale ? "(stale)" : ""}</div>`;
    }

    function card(label, value) {
      return `<div class="stat"><div class="label">${escapeHtml(label)}</div><div class="value">${escapeHtml(String(value))}</div></div>`;
    }

    function fmt(v) {
      const n = Number(v);
      return (v == null || Number.isNaN(n)) ? "-" : n.toLocaleString();
    }

    function parseDate(v) {
      if (!v) return null;
      const d = new Date(v);
      return Number.isNaN(d.getTime()) ? null : d;
    }

    function isStale(expiresAt) {
      const d = parseDate(expiresAt);
      return Boolean(d && Date.now() > d.getTime());
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    loadStatus();
    setInterval(loadStatus, dashboardConfig.refreshMs);
  </script>
</body>
</html>
