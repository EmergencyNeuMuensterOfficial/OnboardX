<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="OnboardX Discord authentication callback." />
    <meta name="theme-color" content="#0ea5e9" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="OnboardX" />
    <meta property="og:title" content="OnboardX Dashboard" />
    <meta property="og:description" content="Configure your Discord server with OnboardX." />
    <meta property="og:image" content="/branding.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/branding.png" />
    <link rel="icon" type="image/png" href="/branding.png" />
    <title>Opening Login...</title>
  </head>
  <body>
    <script>
      const current = new URL(window.location.href);
      const next = new URL('/', window.location.origin);
      next.searchParams.set('route', 'callback');
      for (const [key, value] of current.searchParams.entries()) {
        next.searchParams.set(key, value);
      }
      window.location.replace(next.toString());
    </script>
  </body>
</html>
